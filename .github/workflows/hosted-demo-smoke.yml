name: hosted-demo-smoke

on:
  workflow_dispatch:
    inputs:
      service_url:
        description: "HTTPS URL of the approved hosted reviewer demo"
        required: true
        type: string
      confirm_logs_redacted:
        description: "I confirmed hosted logs are redacted and show health/answer/unauth evidence"
        required: true
        type: boolean
      confirm_metrics_visible:
        description: "I confirmed hosted service metrics are visible"
        required: true
        type: boolean
      confirm_rollback_runbook:
        description: "I confirmed rollback evidence points to the documented runbook"
        required: true
        type: boolean

jobs:
  hosted-demo-smoke:
    name: hosted reviewer smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run hosted smoke and evidence checks
        env:
          SERVICE_URL: ${{ inputs.service_url }}
          RFP_RAG_REVIEWER_TOKEN: ${{ secrets.RFP_RAG_REVIEWER_TOKEN }}
        run: |
          test -n "$RFP_RAG_REVIEWER_TOKEN"
          uv run python -m rfp_rag.hosted_demo_smoke \
            --base-url "$SERVICE_URL" \
            --reviewer-token "$RFP_RAG_REVIEWER_TOKEN" \
            --expected-git-sha "$(git rev-parse --short HEAD)" \
            --out artifacts/hosted_demo_smoke/summary.json
          uv run python -m rfp_rag.hosted_ops_summary \
            --service-url "$SERVICE_URL" \
            --deployed-git-sha "$(git rev-parse --short HEAD)" \
            --out artifacts/hosted_ops/summary.json \
            ${{ inputs.confirm_logs_redacted && '--confirm-logs-redacted' || '' }} \
            ${{ inputs.confirm_metrics_visible && '--confirm-metrics-visible' || '' }} \
            ${{ inputs.confirm_rollback_runbook && '--confirm-rollback-runbook' || '' }}
          uv run python -m rfp_rag.hosted_deployment_evidence \
            --out artifacts/hosted_deployment_evidence/summary.json
          uv run python -m rfp_rag.production_readiness \
            --out artifacts/production_readiness/summary.json
          uv run python -m rfp_rag.final_portfolio_scorecard \
            --out artifacts/final_portfolio_scorecard/summary.json
          uv run python -m rfp_rag.portfolio_check \
            --out artifacts/portfolio_readiness.json

      - name: Upload hosted evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hosted-demo-evidence
          path: |
            artifacts/hosted_demo_smoke/summary.json
            artifacts/hosted_ops/summary.json
            artifacts/hosted_deployment_evidence/summary.json
            artifacts/production_readiness/summary.json
            artifacts/final_portfolio_scorecard/summary.json
            artifacts/portfolio_readiness.json
